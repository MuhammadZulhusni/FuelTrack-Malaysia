<html>
<head>
    <title>Table</title>
</head>
<body>
    <h2 align="center">Basic HTML Table</h2>
    <table style="width:50%" border="5" align="center">
        <tr>
            <th>Firstname</th>
            <th>Lastname</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Jill</td>
            <td>Smith</td>
            <td align="center">50</td>
        </tr>
        <tr>
            <td>Eve</td>
            <td>Jackson</td>
            <td align="center">94</td>
        </tr>
        <tr>
            <td>John</td>
            <td>Doe</td>
            <td align="center">80</td>
        </tr>
        <tr>
            <td align="center"><img src="uptmlogo.png" width="120" height="80"> </td>
            <td colspan="2" align="center"><a href="http://www.uptm.edu.my">UPTM</a></td>
        </tr>
        <tr>
            <td rowspan="2">merge row</td>
            <td>cell 2</td>
            <td>cell 3</td>
        </tr>
        <tr>
            <td>cell 2</td>
            <td>cell 3</td>
        </tr>
    </table>
</body>
</html>
