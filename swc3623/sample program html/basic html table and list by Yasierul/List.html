<body>

    <ol>
        <li>SWC2353</li>
        <li>SWC2363</li>
        <li>SWC3443</li>
    </ol>
    <br>
    <ol type="I">
        <li>SWC2353</li>
        <li>SWC2363</li>
        <li>SWC3443</li>
    </ol>
    <br>
    <h3>Nested List</h3>
    <ul>
        <li>SWC2353</li>
        <li>SWC2363</li>
        <li>SWC3443</li>
    </ul>
    <br>
    <ul style="list-style-type: circle;">
        <li>SWC2353</li>
        <li>SWC2363</li>
        <li>SWC3443</li>
    </ul>
    <br>
    <h3>Nested List</h3>
    <ol>
        <li>Coffee</li>
            <ul>
                <li>Americano</li>
                <li>Espresso</li>
            </ul>
        <li>Tea</li>

                <li>Green Tea</li>
                <li>Black Tea</li>
            </ul>
        <li>Milk</li>
</body>
</html>
